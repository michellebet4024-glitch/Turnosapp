<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurnosApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F4F0;--surface:#FFFFFF;--surface2:#F0EFE9;--border:#E2E0D8;--border2:#CCCAB8;--text:#1A1916;--text2:#6B6A62;--text3:#9E9C92;--accent:#2D5A3D;--accent-light:#E8F2EB;--accent-text:#1A3D28;--warn:#8B4A00;--warn-bg:#FFF4E6;--danger:#8B1A1A;--danger-bg:#FFF0F0;--info:#1A3D6B;--info-bg:#EFF4FF;--radius:10px;--radius-lg:16px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
  .screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow);}
  .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
  .logo-box{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .logo-box svg{width:18px;height:18px;fill:white;}
  .logo-box-sm{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .logo-box-sm svg{width:15px;height:15px;fill:white;}
  .logo-text{font-size:18px;font-weight:600;letter-spacing:-.3px;}
  .setup-pill{display:inline-block;background:var(--accent-light);color:var(--accent-text);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:1.5rem;}
  .auth-title{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.4px;}
  .auth-sub{font-size:14px;color:var(--text2);margin-bottom:1.8rem;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
  .field input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
  .field input:focus{border-color:var(--accent);}
  .btn-login{width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s;margin-top:.5rem;}
  .btn-login:hover{opacity:.88;}
  .err-box{background:var(--danger-bg);color:var(--danger);border-radius:var(--radius);padding:9px 12px;font-size:13px;margin-top:12px;display:none;}
  /* APP */
  #app{display:none;min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;z-index:100;}
  .sidebar-logo{display:flex;align-items:center;gap:9px;padding:0 .5rem;margin-bottom:2rem;}
  .sidebar-logo-text{font-size:16px;font-weight:600;letter-spacing:-.3px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:var(--accent-light);color:var(--accent-text);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:0 12px;margin:1rem 0 6px;}
  .sidebar-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);}
  .user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
  .av-green{background:var(--accent-light);color:var(--accent-text);}
  .av-blue{background:var(--info-bg);color:var(--info);}
  .user-name{font-size:13px;font-weight:500;}
  .user-role{font-size:11px;color:var(--text3);}
  .btn-logout{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit;margin-top:4px;width:100%;transition:background .12s;}
  .btn-logout:hover{background:var(--surface2);}
  .main{margin-left:220px;padding:2rem 2.5rem;min-height:100vh;}
  .ph{margin-bottom:2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .ph-left .pt{font-size:24px;font-weight:600;letter-spacing:-.5px;}
  .ph-left .ps{font-size:14px;color:var(--text2);margin-top:4px;}
  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;box-shadow:var(--shadow);}
  .card-title{font-size:15px;font-weight:600;margin-bottom:1rem;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
  .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.2px;}
  .bg{background:var(--accent-light);color:var(--accent-text);}
  .bw{background:var(--warn-bg);color:var(--warn);}
  .bd{background:var(--danger-bg);color:var(--danger);}
  .bi{background:var(--info-bg);color:var(--info);}
  .bgr{background:var(--surface2);color:var(--text2);}
  /* CALENDAR */
  .cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .cal-nav{display:flex;align-items:center;gap:12px;}
  .cal-nav button{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .cal-nav button:hover{background:var(--surface2);}
  .cal-month-label{font-size:16px;font-weight:600;letter-spacing:-.3px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .dl{text-align:center;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;padding:4px 0 8px;}
  .cd{border:1px solid var(--border);border-radius:var(--radius);padding:8px;min-height:72px;background:var(--surface);font-size:12px;transition:border-color .12s;}
  .cd.om{background:var(--bg);opacity:.4;}
  .cd.tod{border-color:var(--accent);}
  .dn{font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text2);}
  .cd.tod .dn{color:var(--accent);font-weight:700;}
  .cs{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .s0{background:#E8F2EB;color:#1A3D28;}.s1{background:#EFF4FF;color:#1A3D6B;}.s2{background:#FFF4E6;color:#8B4A00;}.s3{background:#FFF0F0;color:#8B1A1A;}.s4{background:#F5F0FF;color:#3D1A8B;}
  .sleg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
  .sleg-i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
  .sdot{width:10px;height:10px;border-radius:50%;}
  /* REQUESTS */
  .ri{border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;background:var(--surface);margin-bottom:10px;box-shadow:var(--shadow);}
  .rh{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .rt{font-size:15px;font-weight:600;margin-bottom:3px;}
  .rm{font-size:13px;color:var(--text2);}
  .ra{display:flex;gap:8px;margin-top:12px;}
  /* BUTTONS */
  .btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s;border:1px solid;display:inline-flex;align-items:center;gap:6px;}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .btn-g{background:var(--accent-light);color:var(--accent-text);border-color:#B8D9C2;}.btn-g:hover{background:#D4EAD9;}
  .btn-r{background:var(--danger-bg);color:var(--danger);border-color:#F5C5C5;}.btn-r:hover{background:#FFE4E4;}
  .btn-p{background:var(--accent);color:white;border-color:var(--accent);}.btn-p:hover{opacity:.88;}
  .btn-o{background:var(--surface);color:var(--text);border-color:var(--border2);}.btn-o:hover{background:var(--surface2);}
  /* FORMS */
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
  .fg{margin-bottom:1rem;}
  .fg label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
  .fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
  .fg input:focus,.fg select:focus{border-color:var(--accent);}
  /* TABLE */
  .tw{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);}
  td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  /* STATS */
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);}
  .sl{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;}
  .sv{font-size:28px;font-weight:600;letter-spacing:-1px;}
  .ss{font-size:13px;color:var(--text2);margin-top:4px;}
  /* MISC */
  .divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0;}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text3);}
  .empty .ei{font-size:32px;margin-bottom:12px;}
  .mono{font-family:'DM Mono',monospace;font-size:13px;}
  .hidden{display:none!important;}
  .mb2{margin-bottom:1rem;}.mb3{margin-bottom:1.5rem;}
  .ndot{width:7px;height:7px;background:#E24B4A;border-radius:50%;display:inline-block;margin-left:4px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:12px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
  .mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
  .modal-title{font-size:18px;font-weight:600;margin-bottom:1.5rem;letter-spacing:-.3px;}
  @keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fi{animation:fi .2s ease;}
</style>
</head>
<body>

<div id="loading-screen" class="screen" style="display:none;">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
    <div style="font-size:14px;color:var(--text2);">Cargando datos...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<div id="setup-screen" class="screen hidden">
  <div class="auth-card fi">
    <div class="logo-row"><div class="logo-box"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-text">TurnosApp</span></div>
    <div class="setup-pill">Configuración inicial</div>
    <div class="auth-title">Crear cuenta de administrador</div>
    <div class="auth-sub">Este paso solo se realiza una vez. Desde tu cuenta vas a gestionar empleados, turnos y cambios.</div>
    <div class="field"><label>Tu nombre</label><input type="text" id="s-name" placeholder="Nombre completo"></div>
    <div class="field"><label>Email</label><input type="email" id="s-email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="s-pass" placeholder="Mínimo 6 caracteres"></div>
    <div class="field"><label>Confirmar contraseña</label><input type="password" id="s-pass2" placeholder="Repetí la contraseña"></div>
    <button class="btn-login" onclick="createAdmin()">Crear cuenta y entrar</button>
    <div class="err-box" id="s-err"></div>
  </div>
</div>

<div id="auth-screen" class="screen hidden">
  <div class="auth-card fi">
    <div class="logo-row"><div class="logo-box"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-text">TurnosApp</span></div>
    <div class="auth-title">Bienvenido</div>
    <div class="auth-sub">Ingresá con tu cuenta para continuar</div>
    <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="err-box" id="l-err">Email o contraseña incorrectos.</div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-box-sm"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="sidebar-logo-text">TurnosApp</span></div>
    <div id="nav"></div>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="avatar" id="sav"></div>
        <div><div class="user-name" id="sname"></div><div class="user-role" id="srole"></div></div>
      </div>
      <button class="btn-logout" onclick="doLogout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────
const SHIFTS=['08:00 – 12:00','12:00 – 16:00','16:00 – 20:00','20:00 – 00:00','00:00 – 04:00'];
const SC=['s0','s1','s2','s3','s4'];
const MO=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// ── JSONBIN CONFIG ───────────────────────────────────────────
const BIN_ID='69be39a0b7ec241ddc8ac98f';
const BIN_KEY='$2a$10$oHTDe5tzbUNl2FsCjsJPke2WZufyMYAI9WtWDOGOlolGoZjbKp2AW';
const BIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── LOCAL SESSION (solo para la sesión activa) ────────────────
const LS={
  g:k=>{try{return JSON.parse(localStorage.getItem('ta_'+k));}catch(e){return null;}},
  s:(k,v)=>localStorage.setItem('ta_'+k,JSON.stringify(v))
};

let users,employees,requests,overrides,ids;
let cu=null,cp='',cy=new Date().getFullYear(),cm=new Date().getMonth();
let saving=false,pendingSave=false;

// ── CLOUD STORAGE ────────────────────────────────────────────
async function cloudLoad(){
  try{
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY,'X-Bin-Meta':false}});
    if(!r.ok)throw new Error('Load failed');
    const d=await r.json();
    users=d.users||{};employees=d.employees||[];requests=d.requests||[];overrides=d.overrides||{};ids=d.ids||{e:1,r:1};
    return true;
  }catch(e){
    // Fallback to localStorage if offline
    users=LS.g('users')||{};employees=LS.g('emps')||[];requests=LS.g('reqs')||[];overrides=LS.g('ovr')||{};ids=LS.g('ids')||{e:1,r:1};
    return false;
  }
}

async function save(){
  // Save to localStorage immediately as backup
  LS.s('users',users);LS.s('emps',employees);LS.s('reqs',requests);LS.s('ovr',overrides);LS.s('ids',ids);
  // Debounce cloud saves
  if(saving){pendingSave=true;return;}
  saving=true;
  try{
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify({users,employees,requests,overrides,ids})});
  }catch(e){console.warn('Cloud save failed, data saved locally');}
  saving=false;
  if(pendingSave){pendingSave=false;save();}
}

// ── BOOT ─────────────────────────────────────────────────────
function showLoading(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
}
function hideLoading(){document.getElementById('loading-screen').style.display='none';}

async function boot(){
  showLoading();
  await cloudLoad();
  hideLoading();
  const hasAdmin=Object.values(users).some(u=>u.role==='admin');
  if(!hasAdmin){show('setup-screen');}
  else{const ses=LS.g('session');if(ses&&users[ses]){cu={email:ses,...users[ses]};show('app');initApp();}else show('auth-screen');}
}
boot();

function show(id){
  ['setup-screen','auth-screen','app','loading-screen'].forEach(s=>document.getElementById(s).style.display='none');
  const el=document.getElementById(id);
  el.style.display=id==='app'?'block':'flex';
}

// ── SETUP ────────────────────────────────────────────────────
async function createAdmin(){
  const name=g('s-name').trim(),email=g('s-email').trim().toLowerCase(),pass=g('s-pass'),pass2=g('s-pass2');
  const err=document.getElementById('s-err');
  if(!name||!email||!pass){se(err,'Completá todos los campos.');return;}
  if(pass.length<6){se(err,'La contraseña debe tener al menos 6 caracteres.');return;}
  if(pass!==pass2){se(err,'Las contraseñas no coinciden.');return;}
  if(!email.includes('@')){se(err,'Email inválido.');return;}
  users[email]={pass,role:'admin',name,initials:ini(name)};
  await save();LS.s('session',email);cu={email,...users[email]};show('app');initApp();
}

// ── AUTH ─────────────────────────────────────────────────────
function doLogin(){
  const email=g('l-email').trim().toLowerCase(),pass=g('l-pass'),err=document.getElementById('l-err'),u=users[email];
  if(!u||u.pass!==pass){err.style.display='block';return;}
  err.style.display='none';cu={email,...u};LS.s('session',email);show('app');initApp();
}
function doLogout(){
  cu=null;LS.s('session',null);
  document.getElementById('l-email').value='';document.getElementById('l-pass').value='';
  document.getElementById('l-err').style.display='none';show('auth-screen');
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('auth-screen').style.display!=='none')doLogin();
  if(document.getElementById('setup-screen').style.display!=='none')createAdmin();
});

// ── INIT ─────────────────────────────────────────────────────
function initApp(){
  const av=document.getElementById('sav');
  av.textContent=cu.initials;av.className='avatar '+(cu.role==='admin'?'av-blue':'av-green');
  document.getElementById('sname').textContent=cu.name;
  document.getElementById('srole').textContent=cu.role==='admin'?'Administrador':'Empleado';
  buildNav();navigate(cu.role==='admin'?'dashboard':'mi-calendario');
}
function buildNav(){
  const pa=requests.filter(r=>r.status==='peer_accepted').length;
  const pe=cu.role==='employee'?requests.filter(r=>r.toId===cu.employeeId&&r.status==='pending_peer').length:0;
  const nav=document.getElementById('nav');
  if(cu.role==='admin'){nav.innerHTML=`
    <span class="nav-section">Principal</span>
    <button class="nav-item" onclick="navigate('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Panel general</button>

// ── CALENDAR ─────────────────────────────────────────────────
function pgCal(isAdmin){
  const fd2=new Date(cy,cm,1).getDay(),dim=new Date(cy,cm+1,0).getDate(),today=new Date();
  let cells=DN.map(d=>`<div class="dl">${d}</div>`).join('');
  for(let i=0;i<fd2;i++)cells+=`<div class="cd om"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=ds2(cy,cm+1,d),it=today.getFullYear()===cy&&today.getMonth()===cm&&today.getDate()===d;
    let shifts='';
    if(isAdmin){employees.forEach(e=>{const k=`${ds}_${e.id}`,si=overrides[k]!==undefined?overrides[k]:e.shiftIdx;shifts+=`<div class="cs ${SC[si]}" title="${e.name}: ${SHIFTS[si]}">${e.name.split(' ')[0].slice(0,4)}: ${SHIFTS[si].split('–')[0].trim()}</div>`;});}
    else{const e=employees.find(e=>e.id===cu.employeeId);if(e){const k=`${ds}_${e.id}`,si=overrides[k]!==undefined?overrides[k]:e.shiftIdx;shifts=`<div class="cs ${SC[si]}">${SHIFTS[si]}</div>`;}}
    cells+=`<div class="cd${it?' tod':''}"><div class="dn">${d}</div>${shifts}</div>`;
  }
  const bgs=['#E8F2EB','#EFF4FF','#FFF4E6','#FFF0F0','#F5F0FF'],cls2=['#1A3D28','#1A3D6B','#8B4A00','#8B1A1A','#3D1A8B'];
  const leg=SHIFTS.map((s,i)=>`<div class="sleg-i"><div class="sdot" style="background:${bgs[i]};outline:1.5px solid ${cls2[i]};"></div>${s}</div>`).join('');
  return`<div class="ph"><div class="ph-left"><div class="pt">${isAdmin?'Calendario de turnos':'Mi calendario'}</div><div class="ps">${isAdmin?'Vista general de todos los empleados':`Turnos de ${cu.name}`}</div></div>
    ${isAdmin?`<button class="btn btn-o btn-sm" onclick="expXls()">↓ Exportar Excel</button>`:''}
  </div>
  <div class="card">
    <div class="cal-hdr"><div class="cal-nav">
      <button onclick="calNav(-1)">‹</button><span class="cal-month-label">${MO[cm]} ${cy}</span><button onclick="calNav(1)">›</button>
    </div></div>
    ${isAdmin&&employees.length>0?`<div class="sleg">${leg}</div>`:''}
    ${isAdmin&&employees.length===0?`<div class="empty"><div class="ei">📅</div><p>Agregá empleados para ver sus turnos.</p></div>`:`<div class="cal-grid">${cells}</div>`}
  </div>`;
}
function calNav(d){cm+=d;if(cm<0){cm=11;cy--;}if(cm>11){cm=0;cy++;}navigate(cp);}

// ── SOLICITUDES ADMIN ────────────────────────────────────────
function pgSolAdmin(){
  const pen=requests.filter(r=>r.status==='peer_accepted'),oth=requests.filter(r=>r.status!=='peer_accepted');
  const bb={pending_peer:'bw',peer_accepted:'bi',approved:'bg',rejected:'bd'};
  const lb={pending_peer:'Esperando confirmación',peer_accepted:'Listo para aprobar',approved:'Aprobado',rejected:'Rechazado'};
  const rr=(r,act)=>{const f=employees.find(e=>e.id===r.fromId),t=employees.find(e=>e.id===r.toId);if(!f||!t)return'';
    return`<div class="ri" id="rq${r.id}"><div class="rh"><div><div class="rt">${f.name} ↔ ${t.name}</div><div class="rm">${fd(r.date)} · <span class="mono">${r.fromShift} ↔ ${r.toShift}</span>${r.reason?' · <em>'+r.reason+'</em>':''}</div></div><span class="badge ${bb[r.status]}">${lb[r.status]}</span></div>
    ${act?`<div class="ra"><button class="btn btn-g" onclick="aAct(${r.id},'ok')">✓ Aprobar cambio</button><button class="btn btn-r" onclick="aAct(${r.id},'no')">✗ Rechazar</button></div>`:''}</div>`;};
  return`<div class="ph"><div class="ph-left"><div class="pt">Solicitudes de cambio</div><div class="ps">Revisá y aprobá los cambios entre empleados</div></div></div>
  ${pen.length>0?`<div style="font-size:13px;font-weight:600;color:var(--warn);margin-bottom:10px;">⬤ Pendientes de tu aprobación (${pen.length})</div><div class="mb3">${pen.map(r=>rr(r,true)).join('')}</div>`:`<div class="card mb2"><div class="empty"><div class="ei">✓</div><p>No hay solicitudes pendientes.</p></div></div>`}
  ${oth.length>0?`<div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;">Otras solicitudes</div>${oth.map(r=>rr(r,false)).join('')}`:''}`;
}
function aAct(id,a){
  const r=requests.find(x=>x.id===id);if(!r)return;
  if(a==='ok'){r.status='approved';const e1=employees.find(e=>e.id===r.fromId),e2=employees.find(e=>e.id===r.toId);overrides[`${r.date}_${r.fromId}`]=e2.shiftIdx;overrides[`${r.date}_${r.toId}`]=e1.shiftIdx;toast('Cambio aprobado y aplicado al calendario ✓');}
  else{r.status='rejected';toast('Solicitud rechazada.');}
  save();buildNav();navigate('sol-admin');
}

function mNewEmp(){
  mc2(`<div class="modal"><div class="modal-title">Nuevo empleado</div>
  <div class="fr"><div class="fg"><label>Nombre completo</label><input type="text" id="ne-name" placeholder="Nombre"></div><div class="fg"><label>Email</label><input type="email" id="ne-email" placeholder="email@ejemplo.com"></div></div>
  <div class="fr"><div class="fg"><label>Contraseña</label><input type="password" id="ne-pass" placeholder="Mínimo 6 caracteres"></div>
  <div class="fg"><label>Turno asignado</label><select id="ne-shift">${SHIFTS.map((s,i)=>`<option value="${i}">${s}</option>`).join('')}</select></div></div>
  <div class="err-box" id="ne-err"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-o" onclick="cm2()">Cancelar</button><button class="btn btn-p" onclick="crEmp()">Crear cuenta</button></div></div>`);
}
function crEmp(){
  const name=g('ne-name').trim(),email=g('ne-email').trim().toLowerCase(),pass=g('ne-pass'),si=parseInt(g('ne-shift')),err=document.getElementById('ne-err');
  if(!name||!email||!pass){se(err,'Completá todos los campos.');return;}
  if(pass.length<6){se(err,'Contraseña mínimo 6 caracteres.');return;}
  if(!email.includes('@')){se(err,'Email inválido.');return;}
  if(users[email]){se(err,'Ya existe una cuenta con ese email.');return;}
  const id=ids.e++;
  employees.push({id,name,email,shiftIdx:si,initials:ini(name)});
  users[email]={pass,role:'employee',name,initials:ini(name),employeeId:id};
  save();cm2();toast(`Cuenta de ${name} creada ✓`);navigate('empleados');
}
function mEditShift(eid){
  const e=employees.find(x=>x.id===eid);
  mc2(`<div class="modal"><div class="modal-title">Editar turno — ${e.name}</div>
  <div class="fg"><label>Turno asignado</label><select id="es-sel">${SHIFTS.map((s,i)=>`<option value="${i}" ${i===e.shiftIdx?'selected':''}>${s}</option>`).join('')}</select></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-o" onclick="cm2()">Cancelar</button><button class="btn btn-p" onclick="savSh(${eid})">Guardar</button></div></div>`);
}
function savSh(eid){const e=employees.find(x=>x.id===eid);e.shiftIdx=parseInt(g('es-sel'));save();cm2();toast(`Turno de ${e.name} actualizado ✓`);navigate('empleados');}
function delEmp(eid){
  const e=employees.find(x=>x.id===eid);
  if(!confirm(`¿Eliminar la cuenta de ${e.name}? Esta acción no se puede deshacer.`))return;
  employees=employees.filter(x=>x.id!==eid);delete users[e.email];requests=requests.filter(r=>r.fromId!==eid&&r.toId!==eid);
  save();toast(`Cuenta de ${e.name} eliminada.`);navigate('empleados');
}

    </div>
    <div class="fg"><label>Motivo (opcional)</label><input type="text" id="r-reason" placeholder="Ej: cita médica, viaje..."></div>
    <div style="background:var(--info-bg);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--info);margin-bottom:1.5rem;">
      <strong>Flujo:</strong> Enviás → tu compañero confirma → el admin aprueba → el calendario se actualiza automáticamente.
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-p" onclick="subReq()">Enviar solicitud →</button>
      <button class="btn btn-o" onclick="navigate('mis-sol')">Cancelar</button>
    </div>
  </div>`;
}
function upPS(){const p=employees.find(e=>e.id===parseInt(g('r-peer')));const sel=document.getElementById('r-ps');if(sel&&p)sel.innerHTML=SHIFTS.map((s,i)=>`<option value="${i}" ${i===p.shiftIdx?'selected':''}>${s}</option>`).join('');}
function subReq(){
  const date=g('r-date'),msi=parseInt(g('r-ms')),pid=parseInt(g('r-peer')),psi=parseInt(g('r-ps')),reason=g('r-reason').trim();
  if(!date){toast('Seleccioná una fecha');return;}
  const today=new Date().toISOString().split('T')[0];
  if(date<today){toast('La fecha debe ser a partir de hoy');return;}
  requests.push({id:ids.r++,fromId:cu.employeeId,toId:pid,date,fromShift:SHIFTS[msi],toShift:SHIFTS[psi],reason,status:'pending_peer',createdAt:today});
  save();buildNav();toast('Solicitud enviada ✓');setTimeout(()=>navigate('mis-sol'),800);
}

// ── MODAL & UTILS ────────────────────────────────────────────
function mc2(html){const c=document.getElementById('mc')||document.createElement('div');if(!c.id){c.id='mc';document.body.appendChild(c);}c.innerHTML=`<div class="mo" onclick="if(event.target===this)cm2()">${html}</div>`;}
function cm2(){const c=document.getElementById('mc');if(c)c.innerHTML='';}
function g(id){const el=document.getElementById(id);return el?el.value:'';}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');}
function ds2(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function fd(s){if(!s)return'';const[y,m,d]=s.split('-');return`${parseInt(d)} ${MS[parseInt(m)-1]} ${y}`;}
function se(el,msg){el.textContent=msg;el.style.display='block';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function expXls(){toast('Exportar Excel disponible con backend conectado.');}

// ── PERIODIC SYNC (cada 30s) ─────────────────────────────────
setInterval(async()=>{
  if(!cu)return;
  const ok=await cloudLoad();
  if(ok)buildNav();
},30000);
</script>
