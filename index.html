<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurnosApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F4F0;color:#1A1916;min-height:100vh;font-size:15px;}
:root{--bg:#F5F4F0;--sur:#FFF;--sur2:#F0EFE9;--brd:#E2E0D8;--brd2:#CCCAB8;--txt:#1A1916;--txt2:#6B6A62;--txt3:#9E9C92;--grn:#2D5A3D;--grnl:#E8F2EB;--grnt:#1A3D28;--wrn:#8B4A00;--wrnb:#FFF4E6;--red:#8B1A1A;--redb:#FFF0F0;--blu:#1A3D6B;--blub:#EFF4FF;--r:10px;--rl:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .2s ease;}
.scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.hidden{display:none!important;}
.card-auth{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.logo-r{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.logo-b{width:36px;height:36px;background:var(--grn);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-b svg{width:18px;height:18px;fill:white;}
.logo-bs{width:30px;height:30px;background:var(--grn);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-bs svg{width:15px;height:15px;fill:white;}
.logo-t{font-size:18px;font-weight:600;letter-spacing:-.3px;}
.pill{display:inline-block;background:var(--grnl);color:var(--grnt);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:1.5rem;}
.auth-title{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.4px;}
.auth-sub{font-size:14px;color:var(--txt2);margin-bottom:1.8rem;}
.fld{margin-bottom:1rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:5px;}
.fld input{width:100%;padding:10px 12px;border:1px solid var(--brd2);border-radius:10px;font-size:14px;font-family:inherit;background:var(--sur);color:var(--txt);outline:none;transition:border-color .15s;}
.fld input:focus{border-color:var(--grn);}
.btn-main{width:100%;padding:11px;background:var(--grn);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:.5rem;}
.btn-main:hover{opacity:.88;}
.err{background:var(--redb);color:var(--red);border-radius:10px;padding:9px 12px;font-size:13px;margin-top:12px;display:none;}
.spinner{width:40px;height:40px;border:3px solid #CCCAB8;border-top-color:#2D5A3D;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:1.5rem 1rem;z-index:100;}
.sb-logo{display:flex;align-items:center;gap:9px;padding:0 .5rem;margin-bottom:2rem;}
.sb-logo-t{font-size:16px;font-weight:600;letter-spacing:-.3px;}
.nav-sec{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;padding:0 12px;margin:1rem 0 6px;}
.nav-i{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;margin-bottom:2px;transition:all .12s;}
.nav-i:hover{background:var(--sur2);color:var(--txt);}
.nav-i.on{background:var(--grnl);color:var(--grnt);}
.nav-i svg{width:16px;height:16px;flex-shrink:0;}
.sb-bot{margin-top:auto;padding-top:1rem;border-top:1px solid var(--brd);}
.upill{display:flex;align-items:center;gap:10px;padding:8px 10px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-g{background:var(--grnl);color:var(--grnt);}
.av-b{background:var(--blub);color:var(--blu);}
.uname{font-size:13px;font-weight:500;}
.urole{font-size:11px;color:var(--txt3);}
.btn-out{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-size:13px;color:var(--txt2);cursor:pointer;border:none;background:none;font-family:inherit;margin-top:4px;width:100%;transition:background .12s;}
.btn-out:hover{background:var(--sur2);}
.main{margin-left:220px;padding:2rem 2.5rem;min-height:100vh;}
.ph{margin-bottom:2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.pt{font-size:24px;font-weight:600;letter-spacing:-.5px;}
.ps{font-size:14px;color:var(--txt2);margin-top:4px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:1.25rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ct{font-size:15px;font-weight:600;margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bg{background:var(--grnl);color:var(--grnt);}
.bw{background:var(--wrnb);color:var(--wrn);}
.bd{background:var(--redb);color:var(--red);}
.bi{background:var(--blub);color:var(--blu);}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav button{width:32px;height:32px;border:1px solid var(--brd2);border-radius:10px;background:var(--sur);cursor:pointer;font-size:16px;color:var(--txt2);display:flex;align-items:center;justify-content:center;}
.cal-nav button:hover{background:var(--sur2);}
.cal-ml{font-size:16px;font-weight:600;letter-spacing:-.3px;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.dlbl{text-align:center;font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;padding:4px 0 8px;}
.cday{border:1px solid var(--brd);border-radius:10px;padding:8px;min-height:72px;background:var(--sur);font-size:12px;}
.cday.om{background:var(--bg);opacity:.4;}
.cday.tod{border-color:var(--grn);}
.dnum{font-size:13px;font-weight:500;margin-bottom:5px;color:var(--txt2);}
.cday.tod .dnum{color:var(--grn);font-weight:700;}
.cs{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s0{background:#E8F2EB;color:#1A3D28;}.s1{background:#EFF4FF;color:#1A3D6B;}.s2{background:#FFF4E6;color:#8B4A00;}.s3{background:#FFF0F0;color:#8B1A1A;}.s4{background:#F5F0FF;color:#3D1A8B;}
.sleg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.sleg-i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2);}
.sdot{width:10px;height:10px;border-radius:50%;}
.ri{border:1px solid var(--brd);border-radius:16px;padding:1rem 1.25rem;background:var(--sur);margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.rh{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.rtt{font-size:15px;font-weight:600;margin-bottom:3px;}
.rm{font-size:13px;color:var(--txt2);}
.ra{display:flex;gap:8px;margin-top:12px;}
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid;display:inline-flex;align-items:center;gap:6px;transition:all .12s;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-g{background:var(--grnl);color:var(--grnt);border-color:#B8D9C2;}.btn-g:hover{background:#D4EAD9;}
.btn-r{background:var(--redb);color:var(--red);border-color:#F5C5C5;}.btn-r:hover{background:#FFE4E4;}
.btn-p{background:var(--grn);color:#fff;border-color:var(--grn);}.btn-p:hover{opacity:.88;}
.btn-o{background:var(--sur);color:var(--txt);border-color:var(--brd2);}.btn-o:hover{background:var(--sur2);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.fg{margin-bottom:1rem;}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1px solid var(--brd2);border-radius:10px;font-size:14px;font-family:inherit;background:var(--sur);color:var(--txt);outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus{border-color:var(--grn);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--txt3);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--brd);}
td{padding:12px 14px;border-bottom:1px solid var(--brd);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--sur2);}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.sl{font-size:12px;font-weight:500;color:var(--txt3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;}
.sv{font-size:28px;font-weight:600;letter-spacing:-1px;}
.ss{font-size:13px;color:var(--txt2);margin-top:4px;}
.mono{font-family:'DM Mono',monospace;font-size:13px;}
.ndot{width:7px;height:7px;background:#E24B4A;border-radius:50%;display:inline-block;margin-left:4px;}
.empty{text-align:center;padding:3rem 1rem;color:var(--txt3);}
.empty .ei{font-size:32px;margin-bottom:12px;}
.mb2{margin-bottom:1rem;}.mb3{margin-bottom:1.5rem;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--txt);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none;}
.toast.on{transform:translateY(0);opacity:1;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--sur);border-radius:16px;padding:2rem;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-t{font-size:18px;font-weight:600;margin-bottom:1.5rem;letter-spacing:-.3px;}
</style>
</head>
<body>

<div id="S-load" class="scr">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#6B6A62;">Cargando...</div>
  </div>
</div>

<div id="S-setup" class="scr hidden">
  <div class="card-auth fi">
    <div class="logo-r"><div class="logo-b"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-t">TurnosApp</span></div>
    <div class="pill">Configuración inicial</div>
    <div class="auth-title">Crear cuenta de administrador</div>
    <div class="auth-sub">Este paso se realiza una sola vez. Desde tu cuenta gestionás empleados, turnos y cambios.</div>
    <div class="fld"><label>Nombre completo</label><input type="text" id="s-name" placeholder="Tu nombre"></div>
    <div class="fld"><label>Email</label><input type="email" id="s-email" placeholder="tu@email.com"></div>
    <div class="fld"><label>Contraseña</label><input type="password" id="s-pass" placeholder="Mínimo 6 caracteres"></div>
    <div class="fld"><label>Confirmar contraseña</label><input type="password" id="s-pass2" placeholder="Repetí la contraseña"></div>
    <button class="btn-main" onclick="createAdmin()">Crear cuenta y entrar</button>
    <div class="err" id="s-err"></div>
  </div>
</div>

<div id="S-login" class="scr hidden">
  <div class="card-auth fi">
    <div class="logo-r"><div class="logo-b"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-t">TurnosApp</span></div>
    <div class="auth-title">Bienvenido</div>
    <div class="auth-sub">Ingresá con tu cuenta para continuar</div>
    <div class="fld"><label>Email</label><input type="email" id="l-email" placeholder="tu@email.com"></div>
    <div class="fld"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"></div>
    <button class="btn-main" onclick="doLogin()">Ingresar</button>
    <div class="err" id="l-err">Email o contraseña incorrectos.</div>
  </div>
</div>

<div id="S-app" class="hidden" style="min-height:100vh;">
  <aside class="sidebar">
    <div class="sb-logo"><div class="logo-bs"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="sb-logo-t">TurnosApp</span></div>
    <div id="nav"></div>
    <div class="sb-bot">
      <div class="upill">
        <div class="av" id="sav"></div>
        <div><div class="uname" id="sname"></div><div class="urole" id="srole"></div></div>
      </div>
      <button class="btn-out" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>
<div id="mc"></div>

<script>
const GH_TOKEN = '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';
const GH_REPO  = 'michellebet4024-glitch/Turnosapp';
const GH_FILE  = 'data.json'; const GH_API = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

const SHIFTS = ['08:00 – 12:00','12:00 – 16:00','16:00 – 20:00','20:00 – 00:00','00:00 – 04:00'];
const SC  = ['s0','s1','s2','s3','s4'];
const MO  = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MS  = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DN  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let DB  = { users:{}, employees:[], requests:[], overrides:{}, ids:{e:1,r:1} };
let cu  = null, cp = '', cy = new Date().getFullYear(), cm = new Date().getMonth();

const LS = {
  g: k => { try { return JSON.parse(localStorage.getItem('ta_'+k)); } catch(e) { return null; } },
  s: (k,v) => { try { localStorage.setItem('ta_'+k, JSON.stringify(v)); } catch(e) {} }
};

function showScreen(id) {
  ['S-load','S-setup','S-login','S-app'].forEach(s => {
    const el = document.getElementById(s);
    if (el) { el.style.display = 'none'; el.classList.remove('hidden'); }
  });
  const el = document.getElementById(id);
  if (el) el.style.display = (id === 'S-app') ? 'block' : 'flex';
}

let ghSha = null;

async function cloudLoad() {
  const res = await fetch(GH_API + '?t=' + Date.now(), {
    headers: {
      'Authorization': 'token ' + GH_TOKEN,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (res.status === 404) {
    // File doesn't exist yet, start fresh
    DB = { users:{}, employees:[], requests:[], overrides:{}, ids:{e:1,r:1} };
    ghSha = null;
    return;
  }
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const file = await res.json();
  ghSha = file.sha;
  const content = JSON.parse(atob(file.content.replace(/\n/g,'')));
  DB = {
    users:     content.users     || {},
    employees: content.employees || [],
    requests:  content.requests  || [],
    overrides: content.overrides || {},
    ids:       content.ids       || {e:1,r:1}
  };
}

let saving = false, pendingSave = false;
async function cloudSave() {
  LS.s('db', DB);
  if (saving) { pendingSave = true; return; }
  saving = true;
  try {
    const body = { message: 'update data', content: btoa(unescape(encodeURIComponent(JSON.stringify(DB)))) };
    if (ghSha) body.sha = ghSha;
    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GH_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (res.ok) { const d = await res.json(); ghSha = d.content.sha; }
  } catch(e) { console.warn('Save failed, stored locally'); }
  saving = false;
  if (pendingSave) { pendingSave = false; cloudSave(); }
}

(async function boot() {
  showScreen('S-load');
  let cloudOk = false;
  try { await cloudLoad(); cloudOk = true; }
  catch(e) { cloudOk = false; }

  if (!cloudOk) {
    // Mostrar pantalla de error con botón reintentar
    document.getElementById('S-load').innerHTML = `
      <div style="text-align:center;padding:2rem;font-family:sans-serif;">
        <div style="font-size:32px;margin-bottom:1rem;">⚠️</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:8px;color:#1A1916;">Sin conexión</div>
        <div style="font-size:14px;color:#6B6A62;margin-bottom:1.5rem;max-width:280px;margin-left:auto;margin-right:auto;">No se pudo conectar al servidor. Verificá tu conexión a internet e intentá de nuevo.</div>
        <button onclick="location.reload()" style="padding:11px 24px;background:#2D5A3D;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;">Reintentar</button>
      </div>`;
    return;
  }

  const hasAdmin = Object.values(DB.users).some(u => u.role === 'admin');
  if (!hasAdmin) { showScreen('S-setup'); return; }
  const ses = LS.g('ses');
  if (ses && DB.users[ses]) { cu = { email:ses, ...DB.users[ses] }; showScreen('S-app'); initApp(); }
  else showScreen('S-login');
})();

async function createAdmin() {
  const name=gv('s-name').trim(), email=gv('s-email').trim().toLowerCase(), pass=gv('s-pass'), pass2=gv('s-pass2'), err=document.getElementById('s-err');
  if (!name||!email||!pass) { showErr(err,'Completá todos los campos.'); return; }
  if (pass.length<6)         { showErr(err,'Contraseña mínimo 6 caracteres.'); return; }
  if (pass!==pass2)           { showErr(err,'Las contraseñas no coinciden.'); return; }
  if (!email.includes('@'))   { showErr(err,'Email inválido.'); return; }
  DB.users[email] = { pass, role:'admin', name, initials:ini(name) };
  await cloudSave();
  LS.s('ses', email); cu = { email, ...DB.users[email] };
  showScreen('S-app'); initApp();
}

function doLogin() {
  const email=gv('l-email').trim().toLowerCase(), pass=gv('l-pass'), err=document.getElementById('l-err'), u=DB.users[email];
  if (!u||u.pass!==pass) { err.style.display='block'; return; }
  err.style.display='none'; cu={email,...u}; LS.s('ses',email); showScreen('S-app'); initApp();
}
function doLogout() {
  cu=null; LS.s('ses',null);
  document.getElementById('l-email').value=''; document.getElementById('l-pass').value='';
  document.getElementById('l-err').style.display='none'; showScreen('S-login');
}
document.addEventListener('keydown', e => {
  if (e.key!=='Enter') return;
  const ls=document.getElementById('S-login'), ss=document.getElementById('S-setup');
  if (ls&&ls.style.display!=='none') doLogin();
  if (ss&&ss.style.display!=='none') createAdmin();
});

function initApp() {
  const av=document.getElementById('sav');
  av.textContent=cu.initials; av.className='av '+(cu.role==='admin'?'av-b':'av-g');
  document.getElementById('sname').textContent=cu.name;
  document.getElementById('srole').textContent=cu.role==='admin'?'Administrador':'Empleado';
  buildNav(); navigate(cu.role==='admin'?'dashboard':'mi-cal');
}

function buildNav() {
  const pa=DB.requests.filter(r=>r.status==='peer_accepted').length;
  const pe=cu.role==='employee'?DB.requests.filter(r=>r.toId===cu.employeeId&&r.status==='pending_peer').length:0;
  const nav=document.getElementById('nav');
  if(cu.role==='admin'){nav.innerHTML=`
    <span class="nav-sec">Principal</span>
    <button class="nav-i" onclick="navigate('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Panel general</button>

function pgCal(isAdmin){
  const fd2=new Date(cy,cm,1).getDay(), dim=new Date(cy,cm+1,0).getDate(), tod=new Date();
  let cells=DN.map(d=>`<div class="dlbl">${d}</div>`).join('');
  for(let i=0;i<fd2;i++) cells+=`<div class="cday om"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const it=tod.getFullYear()===cy&&tod.getMonth()===cm&&tod.getDate()===d;
    let sh='';
    if(isAdmin){DB.employees.forEach(e=>{const k=`${ds}_${e.id}`,si=DB.overrides[k]!==undefined?DB.overrides[k]:e.shiftIdx;sh+=`<div class="cs ${SC[si]}" title="${e.name}: ${SHIFTS[si]}">${e.name.split(' ')[0].slice(0,4)}: ${SHIFTS[si].split('–')[0].trim()}</div>`;});}
    else{const e=DB.employees.find(e=>e.id===cu.employeeId);if(e){const k=`${ds}_${e.id}`,si=DB.overrides[k]!==undefined?DB.overrides[k]:e.shiftIdx;sh=`<div class="cs ${SC[si]}">${SHIFTS[si]}</div>`;}}
    cells+=`<div class="cday${it?' tod':''}"><div class="dnum">${d}</div>${sh}</div>`;
  }
  const bgs=['#E8F2EB','#EFF4FF','#FFF4E6','#FFF0F0','#F5F0FF'],cls2=['#1A3D28','#1A3D6B','#8B4A00','#8B1A1A','#3D1A8B'];
  const leg=SHIFTS.map((s,i)=>`<div class="sleg-i"><div class="sdot" style="background:${bgs[i]};outline:1.5px solid ${cls2[i]};"></div>${s}</div>`).join('');
  return`<div class="ph"><div><div class="pt">${isAdmin?'Calendario de turnos':'Mi calendario'}</div><div class="ps">${isAdmin?'Vista general de todos los empleados':`Turnos de ${cu.name}`}</div></div></div>

  ${isAdmin&&DB.employees.length>0?`<div class="sleg">${leg}</div>`:''}
  ${isAdmin&&DB.employees.length===0?`<div class="empty"><div class="ei">📅</div><p>Agregá empleados para ver turnos.</p></div>`:`<div class="cgrid">${cells}</div>`}</div>`;
}

async function crEmp(){
  const name=gv('ne-name').trim(),email=gv('ne-email').trim().toLowerCase(),pass=gv('ne-pass'),si=parseInt(gv('ne-shift')),err=document.getElementById('ne-err');
  if(!name||!email||!pass){showErr(err,'Completá todos los campos.');return;}
  if(pass.length<6){showErr(err,'Contraseña mínimo 6 caracteres.');return;}
  if(!email.includes('@')){showErr(err,'Email inválido.');return;}
  if(DB.users[email]){showErr(err,'Ya existe una cuenta con ese email.');return;}
  const id=DB.ids.e++;
  DB.employees.push({id,name,email,shiftIdx:si,initials:ini(name)});
  DB.users[email]={pass,role:'employee',name,initials:ini(name),employeeId:id};
  await cloudSave();closeModal();toast(`Cuenta de ${name} creada ✓`);navigate('empleados');
}
function mEditShift(eid){const e=DB.employees.find(x=>x.id===eid);openModal(`<div class="modal"><div class="modal-t">Editar turno — ${e.name}</div><div class="fg"><label>Turno asignado</label><select id="es-sel">${SHIFTS.map((s,i)=>`<option value="${i}" ${i===e.shiftIdx?'selected':''}>${s}</option>`).join('')}</select></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-o" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="savSh(${eid})">Guardar</button></div></div>`);}

async function delEmp(eid){
  const e=DB.employees.find(x=>x.id===eid);

  DB.employees=DB.employees.filter(x=>x.id!==eid);delete DB.users[e.email];DB.requests=DB.requests.filter(r=>r.fromId!==eid&&r.toId!==eid);
  await cloudSave();toast(`Cuenta de ${e.name} eliminada.`);navigate('empleados');

  const date=gv('r-date'),msi=parseInt(gv('r-ms')),pid=parseInt(gv('r-peer')),psi=parseInt(gv('r-ps')),reason=gv('r-reason').trim();
  if(!date){toast('Seleccioná una fecha');return;}
  if(date<new Date().toISOString().split('T')[0]){toast('La fecha debe ser a partir de hoy');return;}
  DB.requests.push({id:DB.ids.r++,fromId:cu.employeeId,toId:pid,date,fromShift:SHIFTS[msi],toShift:SHIFTS[psi],reason,status:'pending_peer',createdAt:new Date().toISOString().split('T')[0]});
  await cloudSave();buildNav();toast('Solicitud enviada ✓');setTimeout(()=>navigate('mis-sol'),800);
}

function openModal(html){document.getElementById('mc').innerHTML=`<div class="mo" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function closeModal(){document.getElementById('mc').innerHTML='';}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');}
function fd(s){if(!s)return'';const[y,m,d]=s.split('-');return`${parseInt(d)} ${MS[parseInt(m)-1]} ${y}`;}
function showErr(el,msg){el.textContent=msg;el.style.display='block';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}

setInterval(async()=>{if(!cu)return;try{await cloudLoad();buildNav();}catch(e){}},30000);
</script>
