<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurnosApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#FFF;--surface2:#F0EFE9;--border:#E2E0D8;--border2:#CCCAB8;--text:#1A1916;--text2:#6B6A62;--text3:#9E9C92;--accent:#2D5A3D;--al:#E8F2EB;--at:#1A3D28;--warn:#8B4A00;--wb:#FFF4E6;--danger:#8B1A1A;--db:#FFF0F0;--info:#1A3D6B;--ib:#EFF4FF;--r:10px;--rl:16px;--sh:0 1px 3px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card-auth{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--sh);}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.logo-ico{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-ico svg,.logo-ico-sm svg{fill:white;}
.logo-ico svg{width:18px;height:18px;}
.logo-ico-sm{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-ico-sm svg{width:15px;height:15px;}
.logo-txt{font-size:18px;font-weight:600;letter-spacing:-.3px;}
.pill{display:inline-block;background:var(--al);color:var(--at);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:1.5rem;}
.auth-title{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.4px;}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:1.8rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--accent);}
.btn-main{width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:.5rem;}
.btn-main:hover{opacity:.88;}
.err{background:var(--db);color:var(--danger);border-radius:var(--r);padding:9px 12px;font-size:13px;margin-top:12px;display:none;}
#app{display:none;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;z-index:100;}
.sb-logo{display:flex;align-items:center;gap:9px;padding:0 .5rem;margin-bottom:2rem;}
.sb-logo-txt{font-size:16px;font-weight:600;letter-spacing:-.3px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--al);color:var(--at);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.nav-sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:0 12px;margin:1rem 0 6px;}
.sb-bot{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);}
.u-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-g{background:var(--al);color:var(--at);}
.av-b{background:var(--ib);color:var(--info);}
.u-name{font-size:13px;font-weight:500;}
.u-role{font-size:11px;color:var(--text3);}
.btn-out{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit;margin-top:4px;width:100%;transition:background .12s;}
.btn-out:hover{background:var(--surface2);}
.main{margin-left:220px;padding:2rem 2.5rem;min-height:100vh;}
.ph{margin-bottom:2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.pt{font-size:24px;font-weight:600;letter-spacing:-.5px;}
.ps{font-size:14px;color:var(--text2);margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;box-shadow:var(--sh);}
.card-t{font-size:15px;font-weight:600;margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bg{background:var(--al);color:var(--at);}
.bw{background:var(--wb);color:var(--warn);}
.bd{background:var(--db);color:var(--danger);}
.bi{background:var(--ib);color:var(--info);}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav button{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.cal-nav button:hover{background:var(--surface2);}
.cal-ml{font-size:16px;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.dl{text-align:center;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;padding:4px 0 8px;}
.cd{border:1px solid var(--border);border-radius:var(--r);padding:8px;min-height:72px;background:var(--surface);font-size:12px;}
.cd.om{background:var(--bg);opacity:.4;}
.cd.tod{border-color:var(--accent);}
.dn{font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text2);}
.cd.tod .dn{color:var(--accent);font-weight:700;}
.cs{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s0{background:#E8F2EB;color:#1A3D28;}.s1{background:#EFF4FF;color:#1A3D6B;}.s2{background:#FFF4E6;color:#8B4A00;}.s3{background:#FFF0F0;color:#8B1A1A;}.s4{background:#F5F0FF;color:#3D1A8B;}
.sleg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.sleg-i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.sdot{width:10px;height:10px;border-radius:50%;}
.ri{border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;background:var(--surface);margin-bottom:10px;box-shadow:var(--sh);}
.rh{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.rt{font-size:15px;font-weight:600;margin-bottom:3px;}
.rm{font-size:13px;color:var(--text2);}
.ra{display:flex;gap:8px;margin-top:12px;}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s;border:1px solid;display:inline-flex;align-items:center;gap:6px;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-g{background:var(--al);color:var(--at);border-color:#B8D9C2;}.btn-g:hover{background:#D4EAD9;}
.btn-r{background:var(--db);color:var(--danger);border-color:#F5C5C5;}.btn-r:hover{background:#FFE4E4;}
.btn-p{background:var(--accent);color:white;border-color:var(--accent);}.btn-p:hover{opacity:.88;}
.btn-o{background:var(--surface);color:var(--text);border-color:var(--border2);}.btn-o:hover{background:var(--surface2);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.fg{margin-bottom:1rem;}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);}
.sl{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;}
.sv{font-size:28px;font-weight:600;letter-spacing:-1px;}
.ss{font-size:13px;color:var(--text2);margin-top:4px;}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);}
.mono{font-family:'DM Mono',monospace;font-size:13px;}
.ndot{width:7px;height:7px;background:#E24B4A;border-radius:50%;display:inline-block;margin-left:4px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:12px 18px;border-radius:var(--r);font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--rl);padding:2rem;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-t{font-size:18px;font-weight:600;margin-bottom:1.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .2s ease;}
</style>
</head>
<body>

<div id="S-load" class="screen" style="display:flex;">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:3px solid #CCCAB8;border-top-color:#2D5A3D;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;"></div>
    <div style="font-size:14px;color:#6B6A62;">Cargando...</div>
  </div>
</div>

<div id="S-setup" class="screen" style="display:none;">
  <div class="card-auth fi">
    <div class="logo-row"><div class="logo-ico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-txt">TurnosApp</span></div>
    <div class="pill">Configuración inicial</div>
    <div class="auth-title">Crear cuenta de administrador</div>
    <div class="auth-sub">Este paso se realiza una sola vez.</div>
    <div class="field"><label>Nombre completo</label><input type="text" id="s-name" placeholder="Tu nombre"></div>
    <div class="field"><label>Email</label><input type="email" id="s-email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="s-pass" placeholder="Mínimo 6 caracteres"></div>
    <div class="field"><label>Confirmar contraseña</label><input type="password" id="s-pass2" placeholder="Repetí la contraseña"></div>
    <button class="btn-main" onclick="createAdmin()">Crear cuenta y entrar</button>
    <div class="err" id="s-err"></div>
  </div>
</div>

<div id="S-login" class="screen" style="display:none;">
  <div class="card-auth fi">
    <div class="logo-row"><div class="logo-ico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="logo-txt">TurnosApp</span></div>
    <div class="auth-title">Bienvenido</div>
    <div class="auth-sub">Ingresá con tu cuenta para continuar</div>
    <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"></div>
    <button class="btn-main" onclick="doLogin()">Ingresar</button>
    <div class="err" id="l-err">Email o contraseña incorrectos.</div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="sb-logo"><div class="logo-ico-sm"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><span class="sb-logo-txt">TurnosApp</span></div>
    <div id="nav"></div>
    <div class="sb-bot">
      <div class="u-pill"><div class="av" id="sav"></div><div><div class="u-name" id="sname"></div><div class="u-role" id="srole"></div></div></div>
      <button class="btn-out" onclick="doLogout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div id="mc"></div>
<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE ────────────────────────────────────────────────
const SB_URL = 'https://hyeqvdgwveuqmigthoxx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5ZXF2ZGd3dmV1cW1pZ3Rob3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjkzMzksImV4cCI6MjA4OTkwNTMzOX0.wLZYpMFkNCy63W0bcVoN6wWWlA1dXL-pD1XaJYnHF7k';
const HDR = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function dbLoad() {
  const r = await fetch(SB_URL+'/rest/v1/appdata?id=eq.1&select=payload', {headers:HDR});
  if (!r.ok) throw new Error('HTTP '+r.status);
  const rows = await r.json();
  if (!rows.length) return {users:{},employees:[],requests:[],overrides:{},ids:{e:1,r:1}};
  return rows[0].payload;
}

async function dbSave(data) {
  const r = await fetch(SB_URL+'/rest/v1/appdata?id=eq.1', {
    method:'PATCH', headers:{...HDR,'Prefer':'return=minimal'},
    body: JSON.stringify({payload: data})
  });
  if (!r.ok) throw new Error('HTTP '+r.status);
}

// ─── STATE ───────────────────────────────────────────────────
const SHIFTS = ['08:00 – 12:00','12:00 – 16:00','16:00 – 20:00','20:00 – 00:00','00:00 – 04:00'];
const SC = ['s0','s1','s2','s3','s4'];
const MO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DN = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const LS = {
  g: k => { try{return JSON.parse(localStorage.getItem('ta_'+k));}catch(e){return null;} },
  s: (k,v) => { try{localStorage.setItem('ta_'+k,JSON.stringify(v));}catch(e){} }
};

let DB = {users:{},employees:[],requests:[],overrides:{},ids:{e:1,r:1}};
let cu = null, cp = '', cy = new Date().getFullYear(), cm = new Date().getMonth();
let saving = false, pendingSave = false;

async function save() {
  LS.s('db', DB);
  if (saving) { pendingSave = true; return; }
  saving = true;
  try { await dbSave(DB); } catch(e) { console.warn('cloud save failed'); }
  saving = false;
  if (pendingSave) { pendingSave = false; save(); }
}

// ─── SCREENS ─────────────────────────────────────────────────
function show(id) {
  ['S-load','S-setup','S-login','app'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = id === 'app' ? 'block' : 'flex';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

// ─── BOOT ────────────────────────────────────────────────────
(async function boot() {
  show('S-load');
  try {
    DB = await dbLoad();
  } catch(e) {
    // Try localStorage fallback
    const cached = LS.g('db');
    if (cached) {
      DB = cached;
    } else {
      document.getElementById('S-load').innerHTML = `
        <div style="text-align:center;padding:2rem;">
          <div style="font-size:32px;margin-bottom:1rem;">⚠️</div>
          <div style="font-size:18px;font-weight:600;margin-bottom:8px;">Sin conexión</div>
          <div style="font-size:14px;color:#6B6A62;margin-bottom:1.5rem;max-width:280px;margin:0 auto 1.5rem;">No se pudo conectar. Verificá tu internet e intentá de nuevo.</div>
          <button onclick="location.reload()" style="padding:11px 24px;background:#2D5A3D;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;">Reintentar</button>
        </div>`;
      return;
    }
  }
  const hasAdmin = Object.values(DB.users).some(u => u.role === 'admin');
  if (!hasAdmin) { show('S-setup'); return; }
  const ses = LS.g('ses');
  if (ses && DB.users[ses]) { cu = {email:ses,...DB.users[ses]}; show('app'); initApp(); }
  else show('S-login');
})();

// ─── SETUP ───────────────────────────────────────────────────
async function createAdmin() {
  const name=gv('s-name').trim(),email=gv('s-email').trim().toLowerCase(),pass=gv('s-pass'),pass2=gv('s-pass2');
  if (!name||!email||!pass) { showErr('s-err','Completá todos los campos.'); return; }
  if (pass.length<6) { showErr('s-err','Mínimo 6 caracteres.'); return; }
  if (pass!==pass2) { showErr('s-err','Las contraseñas no coinciden.'); return; }
  if (!email.includes('@')) { showErr('s-err','Email inválido.'); return; }
  DB.users[email] = {pass,role:'admin',name,initials:ini(name)};
  await save(); LS.s('ses',email); cu={email,...DB.users[email]};
  show('app'); initApp();
}

// ─── AUTH ────────────────────────────────────────────────────
async function doLogin() {
  const email=gv('l-email').trim().toLowerCase(),pass=gv('l-pass');
  const u = DB.users[email];
  if (!u||u.pass!==pass) { document.getElementById('l-err').style.display='block'; return; }
  document.getElementById('l-err').style.display='none';
  cu={email,...u}; LS.s('ses',email); show('app'); initApp();
}
function doLogout() {
  cu=null; LS.s('ses',null);
  document.getElementById('l-email').value='';
  document.getElementById('l-pass').value='';
  document.getElementById('l-err').style.display='none';
  show('S-login');
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('S-login').style.display!=='none')doLogin();
  if(document.getElementById('S-setup').style.display!=='none')createAdmin();
});

// ─── INIT APP ────────────────────────────────────────────────
function initApp() {
  const av=document.getElementById('sav');
  av.textContent=cu.initials; av.className='av '+(cu.role==='admin'?'av-b':'av-g');
  document.getElementById('sname').textContent=cu.name;
  document.getElementById('srole').textContent=cu.role==='admin'?'Administrador':'Empleado';
  buildNav(); navigate(cu.role==='admin'?'dashboard':'mi-cal');
}

function buildNav() {
  const pa=DB.requests.filter(r=>r.status==='peer_accepted').length;
  const pe=cu.role==='employee'?DB.requests.filter(r=>r.toId===cu.employeeId&&r.status==='pending_peer').length:0;
  const nav=document.getElementById('nav');
  if(cu.role==='admin'){nav.innerHTML=`
    <span class="nav-sec">Principal</span>
    <button class="nav-item" onclick="navigate('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Panel general</button>
    <button class="nav-item" onclick="navigate('cal-admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendario</button>
    <span class="nav-sec">Gestión</span>

function navigate(page) {
  cp=page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',!!b.getAttribute('onclick')&&b.getAttribute('onclick').includes(`'${page}'`)));
  const pages={dashboard:pgDash,'cal-admin':()=>pgCal(true),'sol-admin':pgSolAdmin,empleados:pgEmps,historial:pgHist,'mi-cal':()=>pgCal(false),'mis-sol':pgMisSol,'nueva-sol':pgNueva};
  document.getElementById('main').innerHTML=`<div class="fi">${pages[page]?pages[page]():''}</div>`;
}

function pgCal(isAdmin){
  const fd2=new Date(cy,cm,1).getDay(),dim=new Date(cy,cm+1,0).getDate(),today=new Date();
  let cells=DN.map(d=>`<div class="dl">${d}</div>`).join('');
  for(let i=0;i<fd2;i++)cells+=`<div class="cd om"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const it=today.getFullYear()===cy&&today.getMonth()===cm&&today.getDate()===d;
    let sh='';
    if(isAdmin){DB.employees.forEach(e=>{const k=`${ds}_${e.id}`,si=DB.overrides[k]!==undefined?DB.overrides[k]:e.shiftIdx;sh+=`<div class="cs ${SC[si]}">${e.name.split(' ')[0].slice(0,4)}: ${SHIFTS[si].split('–')[0].trim()}</div>`;});}
    else{const e=DB.employees.find(e=>e.id===cu.employeeId);if(e){const k=`${ds}_${e.id}`,si=DB.overrides[k]!==undefined?DB.overrides[k]:e.shiftIdx;sh=`<div class="cs ${SC[si]}">${SHIFTS[si]}</div>`;}}
    cells+=`<div class="cd${it?' tod':''}"><div class="dn">${d}</div>${sh}</div>`;
  }
  const bgs=['#E8F2EB','#EFF4FF','#FFF4E6','#FFF0F0','#F5F0FF'],cls=['#1A3D28','#1A3D6B','#8B4A00','#8B1A1A','#3D1A8B'];
  return`<div class="ph"><div><div class="pt">${isAdmin?'Calendario de turnos':'Mi calendario'}</div><div class="ps">${isAdmin?'Todos los empleados':`Turnos de ${cu.name}`}</div></div></div>
  <div class="card">
    <div class="cal-hdr"><div class="cal-nav"><button onclick="calNav(-1)">‹</button><span class="cal-ml">${MO[cm]} ${cy}</span><button onclick="calNav(1)">›</button></div></div>
    ${isAdmin&&DB.employees.length>0?`<div class="sleg">${SHIFTS.map((s,i)=>`<div class="sleg-i"><div class="sdot" style="background:${bgs[i]};outline:1.5px solid ${cls[i]};"></div>${s}</div>`).join('')}</div>`:''}
    ${isAdmin&&DB.employees.length===0?`<div class="empty"><p>Agregá empleados para ver sus turnos.</p></div>`:`<div class="cal-grid">${cells}</div>`}
  </div>`;
}

async function aAct(id,a){
  const r=DB.requests.find(x=>x.id===id);if(!r)return;
  if(a==='ok'){r.status='approved';const e1=DB.employees.find(e=>e.id===r.fromId),e2=DB.employees.find(e=>e.id===r.toId);DB.overrides[`${r.date}_${r.fromId}`]=e2.shiftIdx;DB.overrides[`${r.date}_${r.toId}`]=e1.shiftIdx;toast('Cambio aprobado ✓');}
  else{r.status='rejected';toast('Solicitud rechazada.');}
  await save();buildNav();navigate('sol-admin');
}

async function crEmp(){
  const name=gv('ne-name').trim(),email=gv('ne-email').trim().toLowerCase(),pass=gv('ne-pass'),si=parseInt(gv('ne-shift'));
  if(!name||!email||!pass){showErr('ne-err','Completá todos los campos.');return;}
  if(pass.length<6){showErr('ne-err','Mínimo 6 caracteres.');return;}
  if(!email.includes('@')){showErr('ne-err','Email inválido.');return;}
  if(DB.users[email]){showErr('ne-err','Ya existe una cuenta con ese email.');return;}
  const id=DB.ids.e++;
  DB.employees.push({id,name,email,shiftIdx:si,initials:ini(name)});
  DB.users[email]={pass,role:'employee',name,initials:ini(name),employeeId:id};
  await save();cm();toast(`Cuenta de ${name} creada ✓`);navigate('empleados');
}

function mEditShift(eid){
  const e=DB.employees.find(x=>x.id===eid);
  mc(`<div class="modal"><div class="modal-t">Editar turno — ${e.name}</div>
  <div class="fg"><label>Turno asignado</label><select id="es-sel">${SHIFTS.map((s,i)=>`<option value="${i}" ${i===e.shiftIdx?'selected':''}>${s}</option>`).join('')}</select></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-o" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="savSh(${eid})">Guardar</button></div></div>`);
}

async function savSh(eid){
  const e=DB.employees.find(x=>x.id===eid);e.shiftIdx=parseInt(gv('es-sel'));
  await save();cm();toast(`Turno de ${e.name} actualizado ✓`);navigate('empleados');
}

async function delEmp(eid){
  const e=DB.employees.find(x=>x.id===eid);
  if(!confirm(`¿Eliminar la cuenta de ${e.name}?`))return;
  DB.employees=DB.employees.filter(x=>x.id!==eid);
  delete DB.users[e.email];
  DB.requests=DB.requests.filter(r=>r.fromId!==eid&&r.toId!==eid);
  await save();toast(`Cuenta de ${e.name} eliminada.`);navigate('empleados');
}

async function subReq(){
  const date=gv('r-date'),msi=parseInt(gv('r-ms')),pid=parseInt(gv('r-peer')),psi=parseInt(gv('r-ps')),reason=gv('r-reason').trim();
  if(!date){toast('Seleccioná una fecha');return;}
  const today=new Date().toISOString().split('T')[0];
  if(date<today){toast('La fecha debe ser futura');return;}
  DB.requests.push({id:DB.ids.r++,fromId:cu.employeeId,toId:pid,date,fromShift:SHIFTS[msi],toShift:SHIFTS[psi],reason,status:'pending_peer',createdAt:today});
  await save();buildNav();toast('Solicitud enviada ✓');setTimeout(()=>navigate('mis-sol'),800);
}

// ─── UTILS ───────────────────────────────────────────────────
function mc(html){const c=document.getElementById('mc');c.innerHTML=`<div class="mo" onclick="if(event.target===this)cm()">${html}</div>`;}
function cm(){document.getElementById('mc').innerHTML='';}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');}
function fd(s){if(!s)return'';const[y,m,d]=s.split('-');return`${parseInt(d)} ${MS[parseInt(m)-1]} ${y}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// Sync every 30s
setInterval(async()=>{if(!cu)return;try{DB=await dbLoad();buildNav();}catch(e){}},30000);
</script>
